<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Two-Factor Authentication — DocVault</title>
  <link rel="stylesheet" href="../static/css/style.css" />
</head>
<body>
<div class="auth-page" style="grid-template-columns: 1fr;">
  <div class="auth-panel auth-right" style="align-items:center;">
    <div class="auth-form-wrap" style="text-align:center; max-width:380px;">

      <div style="font-size:3rem; margin-bottom:1rem;">🔐</div>
      <h1 style="font-size:1.5rem; margin-bottom:0.5rem;">Two-factor authentication</h1>
      <p class="subtitle">Open your authenticator app and enter the 6-digit code for <strong style="color:var(--text-1);">DocVault</strong></p>

      <!-- Flash messages -->
      <!-- <div class="alert alert-error">
        <span class="alert-icon">⚠️</span>
        Invalid code. Please try again.
      </div> -->

      <form action="/auth/2fa/verify" method="POST" id="otpForm">

        <div class="otp-inputs" id="otpInputs">
          <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code" />
          <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" />
          <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" />
          <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" />
          <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" />
          <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        </div>
        <input type="hidden" name="token" id="otpHidden" />

        <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:0.5rem;">
          Verify code
        </button>

      </form>

      <p style="margin-top:1.5rem; font-size:0.85rem; color:var(--text-3);">
        Code expires in <span id="countdown" style="color:var(--warning); font-weight:500;">30s</span>
      </p>

      <div style="margin-top:1.5rem; padding-top:1.5rem; border-top:1px solid var(--border);">
        <p style="font-size:0.85rem; color:var(--text-3); margin-bottom:0.75rem;">Don't have access to your app?</p>
        <a href="/auth/2fa/backup" class="btn btn-ghost btn-sm">Use a backup code</a>
      </div>

      <p style="margin-top:1rem; font-size:0.8rem;">
        <a href="/auth/login" style="color:var(--text-3);">← Back to login</a>
      </p>

    </div>
  </div>
</div>

<script>
  // OTP input auto-advance
  const inputs = document.querySelectorAll('.otp-input');
  inputs.forEach((inp, i) => {
    inp.addEventListener('input', () => {
      inp.value = inp.value.replace(/\D/g, '');
      if (inp.value && i < inputs.length - 1) inputs[i + 1].focus();
      syncHidden();
    });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !inp.value && i > 0) inputs[i - 1].focus();
    });
    inp.addEventListener('paste', e => {
      e.preventDefault();
      const data = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
      data.split('').forEach((ch, j) => { if (inputs[j]) inputs[j].value = ch; });
      syncHidden();
      if (inputs[data.length - 1]) inputs[data.length - 1].focus();
    });
  });

  function syncHidden() {
    document.getElementById('otpHidden').value = [...inputs].map(i => i.value).join('');
  }

  // Countdown
  let secs = 30;
  const cd = document.getElementById('countdown');
  const timer = setInterval(() => {
    secs--;
    cd.textContent = secs + 's';
    if (secs <= 0) {
      clearInterval(timer);
      cd.textContent = 'Expired';
      cd.style.color = 'var(--danger)';
    }
  }, 1000);

  inputs[0].focus();
</script>
</body>
</html>

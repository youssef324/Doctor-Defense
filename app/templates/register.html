{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-lg-6 col-md-8">
        <div class="auth-card p-5">
            <div class="text-center mb-4">
                <i class="fas fa-user-plus fa-3x text-primary mb-3"></i>
                <h2 class="hero-text">Create Account</h2>
            </div>


            <form method="POST">
                <div class="mb-3">
                    <label class="form-label" style="color: #00ff9d;">Username</label>
                    <input type="text" name="username" class="form-control" style="background: #ffffff; color: #000000;" required placeholder="Enter username">
                </div>
                <div class="mb-3">
                    <label class="form-label" style="color: #00ff9d;">Email Address</label>
                    <input type="email" name="email" class="form-control" style="background: #ffffff; color: #000000;" required placeholder="Enter email address">
                </div>
                <div class="mb-3">
                    <label class="form-label" style="color: #00ff9d;">Password</label>
                    <input type="password" name="password" class="form-control" style="background: #ffffff; color: #000000;" required placeholder="Minimum 8 characters with uppercase and number">
                </div>
                <div class="mb-3">
                    <label class="form-label" style="color: #00ff9d;">Password Confirmation</label>
                    <input type="password" name="password_confirm" class="form-control" style="background: #ffffff; color: #000000;" required placeholder="Enter password again">
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3">
                    <i class="fas fa-lock"></i> Create Account & Continue
                </button>
            </form>

            <p class="text-center mt-4 mb-0">
                Already have an account?
                <a href="{{ url_for('auth.login') }}" class="text-primary">Login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

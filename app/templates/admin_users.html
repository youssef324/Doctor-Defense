{% extends "base.html" %}
{% block content %}
<div class="card p-4">
    <h2 class="mb-4" style="color: #00ff9d;"><i class="fas fa-users"></i> Manage Users</h2>
    <table class="table table-hover">
        <thead>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Role</th>
                <th>Joined</th>
            </tr>
        </thead>
        <tbody>
            {% for u in users %}
            <tr>
                <td>{{ u.id }}</td>
                <td><strong>{{ u.username }}</strong></td>
                <td>{{ u.email }}</td>
                <td><span class="badge bg-{{ 'success' if u.role=='Admin' else 'warning' }}">{{ u.role }}</span></td>
                <td>{{ u.created_at.strftime('%b %d, %Y') }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
